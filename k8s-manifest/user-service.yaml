apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  labels:
    app: user-service
spec:
  replicas: 1 
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
    spec:
      containers:
      - name: user-service
        image: tuongndb1609/user-service:latest
        ports:
        - containerPort: 8081 
        env:
        - name: DB_HOST
          value: "postgres-service" 
        - name: DB_PORT
          value: "5432"