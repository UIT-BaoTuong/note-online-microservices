apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  labels:
    app: frontend
spec:
  replicas: 2 
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend
        image: tuongndb1609/frontend:latest
        ports:
        - containerPort: 80 
        env:
        - name: DB_HOST
          value: "postgres-service" 
        - name: DB_PORT
          value: "5432"