apiVersion: apps/v1
kind: Deployment
metadata:
  name: note-service
  labels:
    app: note-service
spec:
  replicas: 2 
  selector:
    matchLabels:
      app: note-service
  template:
    metadata:
      labels:
        app: note-service
    spec:
      containers:
      - name: note-service
        image: tuongndb1609/note-service:latest
        ports:
        - containerPort: 8082 
        env:
        - name: DB_HOST
          value: "postgres-service" 
        - name: DB_PORT
          value: "5432"